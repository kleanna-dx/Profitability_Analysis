<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수익성분석 AI 챗봇</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap');
        *{font-family:'Noto Sans KR',sans-serif;box-sizing:border-box;margin:0;padding:0;}
        html,body{height:100%;overflow:hidden;}
        body{background:#f5f7fb;}

        /* Sidebar */
        .sidebar{
            position:fixed;left:0;top:0;bottom:0;width:280px;
            background:#1e1b4b;color:#fff;z-index:100;
            transform:translateX(-100%);transition:transform .3s ease;
        }
        .sidebar.open{transform:translateX(0);}
        .sidebar-overlay{
            position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:99;
            opacity:0;pointer-events:none;transition:opacity .3s;
        }
        .sidebar-overlay.active{opacity:1;pointer-events:auto;}
        .sidebar-menu-item{
            display:flex;align-items:center;gap:12px;padding:12px 20px;
            font-size:14px;color:#c7d2fe;cursor:pointer;transition:all .15s;
            border-radius:8px;margin:2px 10px;
        }
        .sidebar-menu-item:hover{background:rgba(255,255,255,0.1);color:#fff;}
        .sidebar-menu-item.active{background:rgba(99,102,241,0.3);color:#fff;font-weight:600;}
        .sidebar-menu-item i{width:20px;text-align:center;font-size:15px;}
        .sidebar-divider{height:1px;background:rgba(255,255,255,0.1);margin:12px 16px;}

        /* Main layout */
        .main-wrapper{
            display:flex;flex-direction:column;height:100vh;
        }

        /* Top bar */
        .top-bar{
            background:#fff;border-bottom:1px solid #e5e7eb;padding:12px 20px;
            display:flex;align-items:center;gap:12px;flex-shrink:0;
        }
        .hamburger-btn{
            width:38px;height:38px;display:flex;align-items:center;justify-content:center;
            border-radius:8px;border:1px solid #e5e7eb;background:#fff;cursor:pointer;
            transition:all .15s;color:#475569;font-size:16px;
        }
        .hamburger-btn:hover{background:#f1f5f9;color:#4f46e5;}
        .status-pill{
            display:flex;align-items:center;gap:6px;
            font-size:12px;color:#64748b;background:#f8fafc;
            padding:5px 12px;border-radius:20px;border:1px solid #e5e7eb;
        }
        .status-pill .dot{width:7px;height:7px;border-radius:50%;background:#94a3b8;}
        .status-pill .dot.green{background:#22c55e;box-shadow:0 0 5px rgba(34,197,94,0.4);}

        /* Chat area */
        .chat-area{
            flex:1;overflow-y:auto;padding:24px;
            display:flex;flex-direction:column;gap:20px;
        }

        /* Welcome section */
        .welcome-section{
            display:flex;flex-direction:column;align-items:center;
            padding:40px 20px 20px;text-align:center;
        }
        .welcome-icon{
            width:64px;height:64px;border-radius:16px;
            background:linear-gradient(135deg,#4f46e5,#7c3aed);
            display:flex;align-items:center;justify-content:center;
            font-size:28px;color:#fff;margin-bottom:16px;
            box-shadow:0 4px 16px rgba(79,70,229,0.25);
        }

        /* Suggestion chips */
        .chip{
            display:inline-block;border:1px solid #c7d2fe;color:#4f46e5;
            background:#eef2ff;font-size:13px;padding:8px 16px;border-radius:20px;
            cursor:pointer;transition:all .2s;white-space:nowrap;
        }
        .chip:hover{background:#4f46e5;color:#fff;border-color:#4f46e5;transform:translateY(-1px);box-shadow:0 2px 8px rgba(79,70,229,0.2);}

        /* Chat messages */
        .msg-user{
            align-self:flex-end;max-width:600px;
            background:linear-gradient(135deg,#4f46e5,#6366f1);color:#fff;
            padding:12px 18px;border-radius:18px 18px 4px 18px;
            font-size:14px;line-height:1.6;box-shadow:0 2px 8px rgba(79,70,229,0.15);
        }
        .msg-bot{
            align-self:flex-start;max-width:820px;min-width:340px;width:100%;
        }
        .msg-bot-inner{
            background:#fff;border:1px solid #e5e7eb;
            padding:0;border-radius:16px;overflow:hidden;
            box-shadow:0 1px 4px rgba(0,0,0,0.04);
        }
        .msg-bot-header{
            padding:14px 18px;border-bottom:1px solid #f1f5f9;
            display:flex;align-items:flex-start;gap:10px;
        }
        .bot-avatar{
            width:32px;height:32px;border-radius:8px;flex-shrink:0;
            background:linear-gradient(135deg,#4f46e5,#7c3aed);
            display:flex;align-items:center;justify-content:center;
            color:#fff;font-size:14px;
        }
        .msg-bot-explanation{font-size:13px;color:#475569;line-height:1.6;flex:1;}
        .msg-bot-meta{
            display:flex;align-items:center;gap:8px;margin-top:6px;
        }
        .meta-badge{
            font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;
        }
        .meta-badge.rows{background:#dbeafe;color:#2563eb;}
        .meta-badge.time{background:#f1f5f9;color:#64748b;}

        /* Result tabs inside bot message */
        .res-tabs{
            display:flex;border-bottom:1px solid #f1f5f9;padding:0 16px;background:#fafbfc;
        }
        .res-tab{
            padding:10px 16px;font-size:13px;cursor:pointer;border-bottom:2.5px solid transparent;
            color:#94a3b8;transition:all .15s;font-weight:500;white-space:nowrap;
        }
        .res-tab:hover{color:#6366f1;}
        .res-tab.active{color:#4f46e5;border-bottom-color:#4f46e5;font-weight:600;}

        /* Result panels */
        .res-panel{display:none;}
        .res-panel.active{display:block;}

        /* Data table */
        .data-table{font-size:12px;border-collapse:collapse;width:100%;}
        .data-table th{
            background:#f8fafc;color:#475569;font-weight:600;padding:10px 14px;
            text-align:left;border-bottom:2px solid #e2e8f0;white-space:nowrap;
            position:sticky;top:0;z-index:1;
        }
        .data-table td{padding:10px 14px;border-bottom:1px solid #f1f5f9;white-space:nowrap;}
        .data-table tbody tr:hover{background:#f0f4ff;}

        /* Chart container */
        .chart-container{padding:16px;min-height:320px;position:relative;}

        /* SQL display */
        .sql-display{
            background:#0f172a;color:#e2e8f0;font-size:13px;padding:20px;
            border-radius:0;overflow-x:auto;white-space:pre-wrap;
            line-height:1.8;font-family:'Fira Code','Consolas',monospace;
            tab-size:4;
        }
        .sql-display .kw{color:#7dd3fc;font-weight:700;}       /* SELECT, FROM, WHERE 등 */
        .sql-display .fn{color:#c084fc;}                        /* SUM, ROUND, COALESCE 등 */
        .sql-display .str{color:#fde68a;}                       /* 문자열 리터럴 */
        .sql-display .num{color:#fdba74;}                       /* 숫자 */
        .sql-display .alias{color:#86efac;font-weight:600;}     /* AS 뒤의 alias */
        .sql-display .comment{color:#64748b;font-style:italic;} /* 주석 */

        /* SQL Feedback UI */
        .sql-feedback-bar{
            display:flex;align-items:center;gap:8px;padding:12px 16px;
            background:#f8fafc;border-top:1px solid #f1f5f9;
        }
        .sql-feedback-bar .fb-label{
            font-size:12px;color:#94a3b8;margin-right:auto;
        }
        .fb-btn{
            padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;
            cursor:pointer;transition:all .2s;border:1.5px solid;
            display:inline-flex;align-items:center;gap:5px;
        }
        .fb-btn-correct{
            background:#f0fdf4;color:#16a34a;border-color:#bbf7d0;
        }
        .fb-btn-correct:hover{background:#16a34a;color:#fff;border-color:#16a34a;}
        .fb-btn-correct.selected{background:#16a34a;color:#fff;border-color:#16a34a;}
        .fb-btn-edit{
            background:#eff6ff;color:#2563eb;border-color:#bfdbfe;
        }
        .fb-btn-edit:hover{background:#2563eb;color:#fff;border-color:#2563eb;}
        .fb-btn-edit.selected{background:#2563eb;color:#fff;border-color:#2563eb;}
        .fb-done-msg{
            font-size:12px;color:#16a34a;font-weight:600;
            display:inline-flex;align-items:center;gap:4px;
        }

        /* SQL Editor (수정 모드) */
        .sql-editor-area{
            display:none;border-top:1px solid #1e293b;
        }
        .sql-editor-area.active{display:block;}
        .sql-editor-textarea{
            width:100%;min-height:120px;max-height:260px;resize:vertical;
            background:#1e293b;color:#a5f3fc;font-size:12px;padding:14px 16px;
            border:none;outline:none;line-height:1.7;
            font-family:'Fira Code','Consolas',monospace;
        }
        .sql-editor-textarea:focus{background:#0f172a;}
        .sql-editor-actions{
            display:flex;align-items:center;gap:8px;padding:10px 16px;
            background:#1e293b;border-top:1px solid rgba(255,255,255,0.06);
        }
        .sql-editor-actions .btn-run{
            padding:6px 16px;border-radius:8px;font-size:12px;font-weight:600;
            border:none;cursor:pointer;transition:all .2s;
            display:inline-flex;align-items:center;gap:5px;
            background:linear-gradient(135deg,#4f46e5,#6366f1);color:#fff;
        }
        .sql-editor-actions .btn-run:hover{box-shadow:0 2px 8px rgba(79,70,229,0.3);}
        .sql-editor-actions .btn-cancel{
            padding:6px 14px;border-radius:8px;font-size:12px;
            border:1px solid rgba(255,255,255,0.15);background:transparent;
            color:#94a3b8;cursor:pointer;transition:all .15s;
        }
        .sql-editor-actions .btn-cancel:hover{border-color:#94a3b8;color:#fff;}
        .sql-editor-result{
            padding:10px 16px;font-size:12px;border-top:1px solid rgba(255,255,255,0.06);
        }
        .sql-editor-result.success{color:#86efac;background:#0f172a;}
        .sql-editor-result.error{color:#fca5a5;background:#1a0000;}

        /* Suggestion chips bar (always visible above input) */
        .chips-bar{
            flex-shrink:0;background:#fff;border-top:1px solid #f1f5f9;
            padding:8px 20px 0;
            overflow-x:auto;
            -webkit-overflow-scrolling:touch;
        }
        .chips-bar::-webkit-scrollbar{height:0;display:none;}
        .chips-row{
            max-width:900px;margin:0 auto;
            display:flex;gap:8px;flex-wrap:wrap;justify-content:center;
        }
        .chip-sm{
            display:inline-block;border:1px solid #c7d2fe;color:#4f46e5;
            background:#eef2ff;font-size:12px;padding:5px 14px;border-radius:16px;
            cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0;
        }
        .chip-sm:hover{background:#4f46e5;color:#fff;border-color:#4f46e5;}

        /* Input bar */
        .input-bar{
            flex-shrink:0;background:#fff;border-top:1px solid #e5e7eb;
            padding:12px 20px 16px;
        }
        .input-row{
            max-width:900px;margin:0 auto;display:flex;gap:10px;align-items:center;
        }
        .input-field{
            flex:1;border:1.5px solid #e2e8f0;border-radius:12px;
            padding:12px 16px;font-size:14px;outline:none;
            transition:all .2s;background:#f8fafc;
        }
        .input-field:focus{border-color:#818cf8;box-shadow:0 0 0 3px rgba(129,140,248,0.12);background:#fff;}
        .send-btn{
            width:44px;height:44px;border-radius:12px;border:none;
            background:linear-gradient(135deg,#4f46e5,#6366f1);
            color:#fff;font-size:16px;cursor:pointer;
            display:flex;align-items:center;justify-content:center;
            transition:all .2s;flex-shrink:0;
        }
        .send-btn:hover{box-shadow:0 4px 12px rgba(79,70,229,0.3);transform:translateY(-1px);}
        .send-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none;}
        .mode-toggle{
            font-size:12px;color:#94a3b8;cursor:pointer;padding:4px 10px;
            border-radius:6px;border:1px solid #e5e7eb;background:#fff;
            transition:all .15s;flex-shrink:0;
        }
        .mode-toggle:hover{color:#4f46e5;border-color:#c7d2fe;}
        .mode-toggle.active{color:#4f46e5;background:#eef2ff;border-color:#c7d2fe;font-weight:600;}

        /* SQL textarea mode */
        .sql-textarea{
            flex:1;border:1.5px solid #e2e8f0;border-radius:12px;
            padding:12px 16px;font-size:13px;outline:none;
            transition:all .2s;background:#f8fafc;resize:none;
            font-family:'Fira Code','Consolas',monospace;min-height:44px;max-height:120px;
        }
        .sql-textarea:focus{border-color:#818cf8;box-shadow:0 0 0 3px rgba(129,140,248,0.12);background:#fff;}

        /* Loading animation */
        .typing-indicator{display:flex;align-items:center;gap:4px;padding:8px 0;}
        .typing-dot{
            width:8px;height:8px;border-radius:50%;background:#a5b4fc;
            animation:bounce 1.4s ease-in-out infinite;
        }
        .typing-dot:nth-child(2){animation-delay:.2s;}
        .typing-dot:nth-child(3){animation-delay:.4s;}
        @keyframes bounce{
            0%,80%,100%{transform:translateY(0)}
            40%{transform:translateY(-8px)}
        }

        /* History panel in sidebar */
        .history-list{max-height:calc(100vh - 420px);overflow-y:auto;padding:0 12px 8px;}
        .history-list::-webkit-scrollbar{width:4px;}
        .history-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px;}
        .history-item{
            display:flex;align-items:flex-start;gap:8px;padding:9px 10px;
            border-radius:8px;cursor:pointer;transition:all .15s;
            border:1px solid transparent;margin-bottom:4px;
        }
        .history-item:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.08);}
        .history-item.active{background:rgba(99,102,241,0.25);border-color:rgba(99,102,241,0.3);}
        .history-item-icon{
            width:26px;height:26px;border-radius:6px;flex-shrink:0;
            display:flex;align-items:center;justify-content:center;
            font-size:11px;margin-top:1px;
        }
        .history-item-icon.success{background:rgba(34,197,94,0.15);color:#4ade80;}
        .history-item-icon.failed{background:rgba(239,68,68,0.15);color:#f87171;}
        .history-item-text{flex:1;min-width:0;}
        .history-item-query{
            font-size:12px;color:#e0e7ff;line-height:1.4;
            overflow:hidden;text-overflow:ellipsis;display:-webkit-box;
            -webkit-line-clamp:2;-webkit-box-orient:vertical;
        }
        .history-item-meta{font-size:10px;color:#818cf8;margin-top:3px;opacity:0.7;}
        .history-item-del{
            opacity:0;width:20px;height:20px;border-radius:4px;flex-shrink:0;
            display:flex;align-items:center;justify-content:center;
            color:#f87171;font-size:10px;cursor:pointer;transition:all .15s;
            margin-top:2px;
        }
        .history-item:hover .history-item-del{opacity:1;}
        .history-item-del:hover{background:rgba(239,68,68,0.2);}
        .history-header{
            display:flex;align-items:center;justify-content:space-between;
            padding:8px 16px 6px;}
        .history-clear-btn{
            font-size:10px;color:#a5b4fc;cursor:pointer;padding:2px 8px;
            border-radius:4px;transition:all .15s;
        }
        .history-clear-btn:hover{background:rgba(255,255,255,0.1);color:#fff;}
        .history-empty{
            text-align:center;padding:20px 16px;color:#818cf8;font-size:12px;opacity:0.6;
        }

        /* Scrollbar */
        .chat-area::-webkit-scrollbar{width:6px;}
        .chat-area::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px;}
        .table-scroll::-webkit-scrollbar{width:5px;height:5px;}
        .table-scroll::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px;}

        /* Fade-in */
        .fade-in{animation:fadeIn .3s ease-out;}
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    </style>
</head>
<body>

<!-- ========== SIDEBAR ========== -->
<div id="sidebarOverlay" class="sidebar-overlay" onclick="closeSidebar()"></div>
<aside id="sidebar" class="sidebar">
    <div class="p-5 pb-3">
        <div class="flex items-center justify-between mb-1">
            <h2 class="text-lg font-bold">수익성분석 AI</h2>
            <button onclick="closeSidebar()" class="text-indigo-300 hover:text-white text-lg"><i class="fas fa-times"></i></button>
        </div>
        <p class="text-xs text-indigo-300 opacity-80">ChatGPT API 기반 분석 시스템</p>
    </div>
    <div class="sidebar-divider"></div>

    <!-- Menu Items -->
    <nav class="py-2">
        <div class="sidebar-menu-item active" onclick="closeSidebar()">
            <i class="fas fa-comments"></i><span>자연어 질의</span>
        </div>
        <div class="sidebar-menu-item" onclick="alert('비주얼 쿼리 빌더 - 준비중');closeSidebar();">
            <i class="fas fa-th-large"></i><span>비주얼 쿼리 빌더</span>
            <span style="margin-left:auto;font-size:10px;background:rgba(255,255,255,0.15);padding:2px 8px;border-radius:10px;">준비중</span>
        </div>
        <div class="sidebar-menu-item" onclick="alert('PPT 분석 장표 생성 - 준비중');closeSidebar();">
            <i class="fas fa-file-powerpoint"></i><span>PPT 분석 장표 생성</span>
            <span style="margin-left:auto;font-size:10px;background:rgba(255,255,255,0.15);padding:2px 8px;border-radius:10px;">준비중</span>
        </div>
        <a href="/learning.html" class="sidebar-menu-item" style="text-decoration:none;">
            <i class="fas fa-graduation-cap"></i><span>학습 관리</span>
        </a>
    </nav>

    <div class="sidebar-divider"></div>

    <!-- DB Info -->
    <div class="px-5 py-3">
        <p class="text-xs text-indigo-300 font-semibold mb-2 uppercase tracking-wider">시스템 정보</p>
        <div class="space-y-2 text-xs text-indigo-200">
            <div class="flex items-center gap-2">
                <span id="sideDbDot" class="dot" style="width:7px;height:7px;border-radius:50%;background:#94a3b8;display:inline-block;"></span>
                <span id="sideDbLabel">DB 연결 확인중</span>
            </div>
            <div class="flex items-center gap-2">
                <span id="sideAiDot" class="dot" style="width:7px;height:7px;border-radius:50%;background:#94a3b8;display:inline-block;"></span>
                <span id="sideAiLabel">ChatGPT API</span>
            </div>
            <div class="flex items-center gap-2">
                <i class="fas fa-microchip text-indigo-400" style="width:7px;text-align:center;font-size:10px;"></i>
                <span id="sideModelLabel">Model: -</span>
            </div>
            <div class="flex items-center gap-2">
                <i class="fas fa-database text-indigo-400" style="width:7px;text-align:center;font-size:10px;"></i>
                <span id="sideDataLabel">데이터: -</span>
            </div>
        </div>
    </div>

    <div class="sidebar-divider"></div>

    <!-- Recent History -->
    <div>
        <div class="history-header">
            <p class="text-xs text-indigo-300 font-semibold uppercase tracking-wider"><i class="fas fa-history mr-1"></i>최근 이력</p>
            <span class="history-clear-btn" onclick="clearAllHistory()" title="전체 삭제"><i class="fas fa-trash-alt mr-1"></i>전체 삭제</span>
        </div>
        <div id="historyList" class="history-list">
            <div class="history-empty"><i class="fas fa-inbox"></i><br>아직 질의 이력이 없습니다</div>
        </div>
    </div>

    <div class="sidebar-divider"></div>

    <!-- Schema toggle -->
    <div class="px-5 py-3">
        <div class="flex items-center gap-2 text-xs text-indigo-300 cursor-pointer hover:text-white" onclick="toggleSideSchema()">
            <i id="sideSchemaArrow" class="fas fa-caret-right transition-transform duration-200"></i>
            <span class="font-medium">테이블 스키마</span>
            <span class="opacity-60">(120컬럼)</span>
        </div>
        <div id="sideSchemaContent" class="hidden mt-2 max-h-48 overflow-y-auto text-xs" style="font-size:11px;">
            <table id="sideSchemaTable" class="w-full text-indigo-200" style="border-collapse:collapse;">
            </table>
        </div>
    </div>
</aside>

<!-- ========== MAIN ========== -->
<div class="main-wrapper">

    <!-- Top Bar -->
    <div class="top-bar">
        <button class="hamburger-btn" onclick="openSidebar()" title="메뉴">
            <i class="fas fa-bars"></i>
        </button>
        <h1 class="text-sm font-bold text-gray-800 mr-auto">수익성분석 AI</h1>

        <div class="status-pill">
            <span id="topDbDot" class="dot"></span>
            <span id="topDbLabel">DB</span>
        </div>
        <div class="status-pill">
            <span id="topAiDot" class="dot"></span>
            <span id="topAiLabel">AI</span>
        </div>
        <div class="status-pill hidden sm:flex">
            <span id="topDataLabel">데이터: -</span>
        </div>
    </div>

    <!-- Chat Area -->
    <div id="chatArea" class="chat-area">
        <!-- Welcome -->
        <div id="welcomeSection" class="welcome-section">
            <div class="welcome-icon">
                <i class="fas fa-robot"></i>
            </div>
            <h2 class="text-xl font-bold text-gray-800 mb-2">무엇이든 물어보세요</h2>
            <p class="text-sm text-gray-500 mb-1">자연어로 수익성 데이터를 분석합니다.</p>
            <p class="text-sm text-gray-400">질문을 입력하면 AI가 SQL을 생성하고 결과를 시각화합니다.</p>
        </div>
    </div>

    <!-- Suggestion Chips Bar (always visible) -->
    <div class="chips-bar" id="chipsBar">
        <div class="chips-row" id="fixedChipContainer">
            <span style="color:#94a3b8;font-size:12px;flex-shrink:0;line-height:28px;">예시:</span>
        </div>
    </div>

    <!-- Input Bar -->
    <div class="input-bar">
        <div class="input-row">
            <button id="modeToggle" class="mode-toggle" onclick="toggleInputMode()" title="직접 SQL 모드 전환">

            <input id="queryInput" type="text" class="input-field"
                placeholder="자연어로 질문을 입력하세요 (예: 플랜트별 총매출 현황을 알려줘)"
                autocomplete="off" />
            <textarea id="sqlInput" class="sql-textarea hidden"
                placeholder="SELECT ... FROM bw_profitability_data ..." rows="1"></textarea>
            <button id="sendBtn" class="send-btn" onclick="handleSend()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

</div>

<script>
// ============================================================
// State
// ============================================================
let charts = {}; // chartId -> Chart instance
let inputMode = 'nlq'; // 'nlq' or 'sql'
let isLoading = false;
let msgCounter = 0;
let historyCache = []; // 이력 캐시

const SUGGESTIONS = [
    '플랜트별 총매출 현황을 알려줘',
    '제품계층1(PRODH1)별 매출 비중을 보여줘',
    '일자별 총매출 추이를 보여줘',
    '사업장별 총매출 TOP 10',
    '브랜드별 총매출과 BOX수량을 비교해줘',
    '유통경로별 총매출 구성비를 보여줘',
];

const SCHEMA_COLUMNS = [
    ['CALMONTH','VARCHAR(10)','달력연도/월'],['CALDAY','VARCHAR(10)','달력일'],
    ['CO_AREA','VARCHAR(20)','관리회계 영역'],['PROFIT_CTR','VARCHAR(20)','손익 센터'],
    ['DIVISION','VARCHAR(20)','제품군'],['PLANT','VARCHAR(10)','플랜트'],
    ['DISTR_CHAN','VARCHAR(10)','유통 경로'],['SALES_OFF','VARCHAR(20)','사업장'],
    ['MATL_TYPE','VARCHAR(10)','자재유형'],['PRODH1','VARCHAR(10)','제품계층1'],
    ['PRODH2','VARCHAR(20)','제품계층2'],['PRODH3','VARCHAR(20)','제품계층3'],
    ['ZBRAND','VARCHAR(20)','브랜드1'],['CUSTOMER','VARCHAR(20)','고객'],
    ['MATERIAL','VARCHAR(40)','자재'],['ZQTY_BOX','DECIMAL','수량(BOX)'],
    ['ZAMT001','DECIMAL','총매출'],['ZAMT003','DECIMAL','순매출'],
    ['ZAMT035','DECIMAL','매출총이익'],['ZAMT055','DECIMAL','영업이익'],
    ['ZAMT064','DECIMAL','경상이익'],
];

// ============================================================
// Init
// ============================================================
window.addEventListener('DOMContentLoaded', async () => {
    // Status check
    try {
        const res = await fetch('/api/status');
        const d = await res.json();
        // Top bar
        document.getElementById('topDbDot').classList.add('green');
        document.getElementById('topDbLabel').textContent = 'DB 연결';
        document.getElementById('topAiDot').classList.add('green');
        document.getElementById('topAiLabel').textContent = d.ai;
        document.getElementById('topDataLabel').textContent = '데이터: ' + Number(d.totalRows).toLocaleString() + '행';
        // Sidebar
        document.getElementById('sideDbDot').style.background = '#22c55e';
        document.getElementById('sideDbLabel').textContent = 'DB 연결됨';
        document.getElementById('sideAiDot').style.background = '#22c55e';
        document.getElementById('sideAiLabel').textContent = 'ChatGPT API 연결됨';
        document.getElementById('sideModelLabel').textContent = 'Model: ' + d.ai;
        document.getElementById('sideDataLabel').textContent = '데이터: ' + Number(d.totalRows).toLocaleString() + '행';
    } catch(e) {
        document.getElementById('topDbLabel').textContent = 'DB 오류';
    }

    // Suggestion chips - fixed bar (always visible above input)
    const fc = document.getElementById('fixedChipContainer');
    SUGGESTIONS.forEach(s => {
        const btn = document.createElement('button');
        btn.className = 'chip-sm';
        btn.textContent = s;
        btn.onclick = () => sendQuery(s);
        fc.appendChild(btn);
    });

    // Schema table in sidebar
    const st = document.getElementById('sideSchemaTable');
    let sh = '';
    SCHEMA_COLUMNS.forEach(c => {
        sh += `<tr style="border-bottom:1px solid rgba(255,255,255,0.05)"><td style="padding:3px 4px;color:#a5b4fc;font-family:monospace;">${c[0]}</td><td style="padding:3px 4px;opacity:0.6;">${c[2]}</td></tr>`;
    });
    st.innerHTML = sh;

    // Enter key
    document.getElementById('queryInput').addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.isComposing && !isLoading) handleSend();
    });
    document.getElementById('sqlInput').addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey && !e.isComposing && !isLoading) { e.preventDefault(); handleSend(); }
    });

    // 최근 이력 로드
    await loadHistory();
});

// ============================================================
// Sidebar
// ============================================================
function openSidebar() {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('sidebarOverlay').classList.add('active');
}
function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('active');
}
function toggleSideSchema() {
    const c = document.getElementById('sideSchemaContent');
    const a = document.getElementById('sideSchemaArrow');
    c.classList.toggle('hidden');
    a.style.transform = c.classList.contains('hidden') ? '' : 'rotate(90deg)';
}

// ============================================================
// Input Mode Toggle
// ============================================================
function toggleInputMode() {
    const btn = document.getElementById('modeToggle');
    const nlq = document.getElementById('queryInput');
    const sql = document.getElementById('sqlInput');
    if (inputMode === 'nlq') {
        inputMode = 'sql';
        nlq.classList.add('hidden');
        sql.classList.remove('hidden');
        btn.classList.add('active');
        sql.focus();
    } else {
        inputMode = 'nlq';
        sql.classList.add('hidden');
        nlq.classList.remove('hidden');
        btn.classList.remove('active');
        nlq.focus();
    }
}

// ============================================================
// Send
// ============================================================
function handleSend() {
    if (isLoading) return;
    if (inputMode === 'nlq') {
        const q = document.getElementById('queryInput').value.trim();
        if (!q) return;
        sendQuery(q);
    } else {
        const s = document.getElementById('sqlInput').value.trim();
        if (!s) return;
        sendQuery('직접 SQL 실행: ' + s);
    }
}

async function sendQuery(query) {
    if (isLoading) return;
    isLoading = true;

    const btn = document.getElementById('sendBtn');
    btn.disabled = true;

    // Hide welcome
    const welcome = document.getElementById('welcomeSection');
    if (welcome) welcome.style.display = 'none';

    // Clear inputs
    document.getElementById('queryInput').value = '';
    document.getElementById('sqlInput').value = '';

    const chatArea = document.getElementById('chatArea');

    // User message
    const userMsg = document.createElement('div');
    userMsg.className = 'msg-user fade-in';
    userMsg.textContent = query;
    chatArea.appendChild(userMsg);

    // Typing indicator
    const typingEl = document.createElement('div');
    typingEl.className = 'msg-bot fade-in';
    typingEl.innerHTML = `
        <div style="display:flex;align-items:center;gap:10px;padding:12px 0;">
            <div class="bot-avatar"><i class="fas fa-robot"></i></div>
            <div class="typing-indicator">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        </div>`;
    chatArea.appendChild(typingEl);
    scrollToBottom();

    try {
        const res = await fetch('/api/nlq', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query }),
        });
        const data = await res.json();

        // Remove typing
        typingEl.remove();

        if (!res.ok || data.error) {
            appendErrorMessage(data.error || '서버 오류가 발생했습니다.');
        } else {
            appendBotMessage(data);
        }
        // 이력 새로고침 (비동기)
        loadHistory().catch(() => {});
    } catch(err) {
        typingEl.remove();
        appendErrorMessage('서버 연결 오류: ' + err.message);
        loadHistory().catch(() => {});
    } finally {
        isLoading = false;
        btn.disabled = false;
    }
}

// ============================================================
// Append Bot Message (Result)
// ============================================================
function appendBotMessage(data) {
    msgCounter++;
    const id = 'msg' + msgCounter;
    const chatArea = document.getElementById('chatArea');

    const botMsg = document.createElement('div');
    botMsg.className = 'msg-bot fade-in';

    // Build tabs content
    const chartId = 'chart_' + id;
    const hasChart = data.chartType && data.chartType !== 'table';

    let tabsHtml = `
        <div class="res-tabs">
            <div class="res-tab ${hasChart ? 'active' : ''}" data-panel="${id}_chart" onclick="switchTab(this,'${id}')" ${!hasChart ? 'style="display:none"' : ''}>
                <i class="fas fa-chart-bar mr-1"></i>차트
            </div>
            <div class="res-tab ${!hasChart ? 'active' : ''}" data-panel="${id}_table" onclick="switchTab(this,'${id}')">
                <i class="fas fa-table mr-1"></i>표
            </div>
            <div class="res-tab" data-panel="${id}_sql" onclick="switchTab(this,'${id}')">
                <i class="fas fa-code mr-1"></i>SQL
            </div>
        </div>`;

    // Table HTML
    let tableHtml = '<div class="p-4 text-center text-sm text-gray-400">결과가 없습니다.</div>';
    if (data.data && data.data.length > 0) {
        const cols = Object.keys(data.data[0]);
        let t = '<div class="table-scroll" style="max-height:400px;overflow:auto;"><table class="data-table"><thead><tr><th>#</th>';
        cols.forEach(c => t += `<th>${esc(c)}</th>`);
        t += '</tr></thead><tbody>';
        data.data.forEach((row, i) => {
            t += `<tr><td class="text-gray-400">${i+1}</td>`;
            cols.forEach(c => {
                let v = row[c];
                if (v === null || v === undefined) v = '-';
                else if (typeof v === 'number') v = v.toLocaleString('ko-KR');
                const align = typeof row[c] === 'number' ? 'text-right font-mono' : '';
                t += `<td class="${align}">${esc(String(v))}</td>`;
            });
            t += '</tr>';
        });
        t += '</tbody></table></div>';
        tableHtml = t;
    }

    botMsg.innerHTML = `
        <div class="msg-bot-inner">
            <div class="msg-bot-header">
                <div class="bot-avatar"><i class="fas fa-robot"></i></div>
                <div style="flex:1;">
                    <div class="msg-bot-explanation">${esc(data.explanation || '')}</div>
                    <div class="msg-bot-meta">
                        <span class="meta-badge rows"><i class="fas fa-table mr-1"></i>${data.rowCount || 0}행</span>
                        <span class="meta-badge time"><i class="fas fa-clock mr-1"></i>${data.executionTimeMs || 0}ms</span>
                    </div>
                </div>
            </div>
            ${tabsHtml}
            <div id="${id}_chart" class="res-panel ${hasChart ? 'active' : ''}" style="${!hasChart ? 'display:none' : ''}">
                <div class="chart-container"><canvas id="${chartId}" height="300"></canvas></div>
            </div>
            <div id="${id}_table" class="res-panel ${!hasChart ? 'active' : ''}">
                ${tableHtml}
            </div>
            <div id="${id}_sql" class="res-panel">
                <div class="sql-display-wrap">
                    <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 16px 0;background:#0f172a;">
                        <span style="font-size:11px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;">GENERATED SQL</span>
                        <span style="font-size:10px;color:#1e293b;background:#86efac;padding:2px 8px;border-radius:4px;font-weight:700;">ChatGPT</span>
                    </div>
                    <pre class="sql-display" id="${id}_sqlPre">${formatAndHighlightSql(data.sql || '')}</pre>
                    <div class="sql-editor-area" id="${id}_editor">

                            <button class="btn-cancel" onclick="cancelSqlEdit('${id}')">

                            </button>

}

// ============================================================
// Render Chart in Message
// ============================================================
function renderMsgChart(canvasId, data) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');

    const rows = data.data || [];
    if (rows.length === 0) return;

    const chartType = data.chartType || 'bar';
    if (chartType === 'table') return;

    const config = data.chartConfig || {};
    const columns = Object.keys(rows[0]);
    const labelCol = config.labelColumn || columns[0];
    let dataCols = config.dataColumns || columns.filter(c => c !== labelCol);
    dataCols = dataCols.filter(c => {
        const v = rows[0][c];
        return typeof v === 'number' || (typeof v === 'string' && !isNaN(Number(v)));
    });
    if (dataCols.length === 0) dataCols = columns.filter(c => c !== labelCol && typeof rows[0][c] === 'number');
    if (dataCols.length === 0) return;

    const labels = rows.map(r => r[labelCol] != null ? String(r[labelCol]) : '');
    const colors = [
        'rgba(79,70,229,0.75)','rgba(16,185,129,0.75)','rgba(245,158,11,0.75)',
        'rgba(239,68,68,0.75)','rgba(139,92,246,0.75)','rgba(236,72,153,0.75)',
        'rgba(20,184,166,0.75)','rgba(249,115,22,0.75)','rgba(99,102,241,0.75)',
        'rgba(34,197,94,0.75)','rgba(168,85,247,0.75)','rgba(244,63,94,0.75)',
    ];
    const borders = colors.map(c => c.replace('0.75','1'));

    let datasets;
    if (chartType === 'pie' || chartType === 'doughnut') {
        datasets = [{
            data: rows.map(r => Number(r[dataCols[0]]) || 0),
            backgroundColor: colors.slice(0, rows.length),
            borderWidth: 2, borderColor: '#fff',
        }];
    } else {
        datasets = dataCols.map((c, i) => ({
            label: c,
            data: rows.map(r => Number(r[c]) || 0),
            backgroundColor: colors[i % colors.length],
            borderColor: borders[i % borders.length],
            borderWidth: chartType === 'line' ? 2.5 : 1,
            tension: 0.35, fill: false,
            borderRadius: chartType === 'bar' ? 4 : 0,
        }));
    }

    const chart = new Chart(ctx, {
        type: chartType,
        data: { labels, datasets },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: {
                title: {
                    display: !!config.title, text: config.title || '',
                    font: { size: 14, family: 'Noto Sans KR', weight: '600' },
                    color: '#1e293b', padding: { bottom: 12 },
                },
                legend: {
                    display: chartType === 'pie' || chartType === 'doughnut' || dataCols.length > 1,
                    labels: { font: { size: 11, family: 'Noto Sans KR' }, usePointStyle: true, padding: 12 },
                },
                tooltip: {
                    backgroundColor: 'rgba(15,23,42,0.9)',
                    titleFont: { family: 'Noto Sans KR', size: 12 },
                    bodyFont: { family: 'Noto Sans KR', size: 11 },
                    padding: 10, cornerRadius: 8,
                    callbacks: {
                        label: ctx => {
                            let v = ctx.parsed.y ?? ctx.parsed;
                            return (ctx.dataset.label||'') + ': ' + (typeof v==='number'?v.toLocaleString('ko-KR'):v);
                        }
                    }
                }
            },
            scales: (chartType === 'pie' || chartType === 'doughnut') ? {} : {
                x: { ticks: { font: { size: 10, family: 'Noto Sans KR' }, maxRotation: 45, color: '#64748b' }, grid: { display: false } },
                y: { ticks: { font: { size: 10 }, callback: v => Number(v).toLocaleString('ko-KR'), color: '#64748b' }, grid: { color: 'rgba(0,0,0,0.04)' } },
            },
        },
    });
    charts[canvasId] = chart;
}

// ============================================================
// Tab switch inside message

function switchTab(btn, msgId) {
    const panelId = btn.dataset.panel;
    // Deactivate all tabs in this message
    btn.parentElement.querySelectorAll('.res-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');

    const card = btn.closest('.msg-bot-inner');
    card.querySelectorAll('.res-panel').forEach(p => { p.classList.remove('active'); p.style.display = 'none'; });
    const target = document.getElementById(panelId);
    if (target) { target.classList.add('active'); target.style.display = 'block'; }
}

// ============================================================
// Utils
// ============================================================
function scrollToBottom() {
    const ca = document.getElementById('chatArea');
    setTimeout(() => { ca.scrollTop = ca.scrollHeight; }, 50);
}
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ============================================================
// SQL Formatter + Syntax Highlighter
// ============================================================
function formatAndHighlightSql(rawSql) {
    if (!rawSql) return '';
    let sql = rawSql.trim().replace(/;+\s*$/, '');

    // ── Step 1: 포맷팅 (줄바꿈 + 들여쓰기) ──
    // 문자열 리터럴을 임시 치환하여 내부 키워드 매칭 방지
    const strings = [];
    sql = sql.replace(/'([^']*)'/g, (m) => {
        strings.push(m);
        return `__STR${strings.length - 1}__`;
    });

    // 세미콜론 제거
    sql = sql.replace(/;\s*$/, '');

    // 주요 키워드 앞에서 줄바꿈 (최상위 키워드)
    const topKw = ['SELECT','FROM','WHERE','GROUP\\s+BY','ORDER\\s+BY','HAVING','LIMIT','LEFT\\s+JOIN','RIGHT\\s+JOIN','INNER\\s+JOIN','FULL\\s+JOIN','JOIN','ON','UNION\\s+ALL','UNION','INSERT','UPDATE','DELETE','SET','VALUES','INTO'];
    for (const kw of topKw) {
        const re = new RegExp('\\s+(' + kw + ')\\b', 'gi');
        sql = sql.replace(re, '\n$1');
    }

    // SELECT 뒤의 컬럼들: 콤마 뒤 줄바꿈 (단, 괄호 안의 콤마는 제외)
    const lines = sql.split('\n');
    const formatted = [];
    for (let line of lines) {
        line = line.trim();
        if (!line) continue;
        const upper = line.toUpperCase();

        if (upper.startsWith('SELECT')) {
            // SELECT 키워드와 컬럼 분리
            const selectPart = line.substring(0, line.toUpperCase().indexOf('SELECT') + 6);
            let rest = line.substring(selectPart.length).trim();
            // 괄호 깊이 추적하며 콤마 분리
            const cols = splitByCommaOutsideParens(rest);
            formatted.push(selectPart);
            cols.forEach((col, i) => {
                formatted.push('    ' + col.trim() + (i < cols.length - 1 ? ',' : ''));
            });
        } else if (upper.startsWith('FROM') || upper.startsWith('WHERE') ||
                   upper.startsWith('GROUP BY') || upper.startsWith('ORDER BY') ||
                   upper.startsWith('HAVING') || upper.startsWith('LIMIT') ||
                   upper.startsWith('LEFT JOIN') || upper.startsWith('RIGHT JOIN') ||
                   upper.startsWith('INNER JOIN') || upper.startsWith('FULL JOIN') ||
                   upper.startsWith('JOIN') || upper.startsWith('ON')) {
            formatted.push(line);
        } else {
            formatted.push('    ' + line);
        }
    }

    let result = formatted.join('\n');

    // 문자열 리터럴 복원
    result = result.replace(/__STR(\d+)__/g, (_, i) => strings[Number(i)]);

    // AND / OR 줄바꿈 (WHERE 내부)
    result = result.replace(/\s+(AND|OR)\s+/gi, (m, kw) => '\n    ' + kw.toUpperCase() + ' ');

    // WHEN / ELSE / END 들여쓰기
    result = result.replace(/\s+(WHEN)\s+/gi, '\n        WHEN ');
    result = result.replace(/\s+(ELSE)\s+/gi, '\n        ELSE ');
    result = result.replace(/\s+(END)\s+/gi, '\n    END ');
    result = result.replace(/\s+(END)\s*$/gim, '\n    END');

    // ── Step 2: 구문 하이라이팅 (HTML) ──
    result = highlightSql(result);

    return result;
}

function splitByCommaOutsideParens(str) {
    const result = [];
    let depth = 0, cur = '';
    for (let i = 0; i < str.length; i++) {
        const ch = str[i];
        if (ch === '(') depth++;
        else if (ch === ')') depth--;
        if (ch === ',' && depth === 0) {
            result.push(cur);
            cur = '';
        } else {
            cur += ch;
        }
    }
    if (cur.trim()) result.push(cur);
    return result;
}

function highlightSql(sql) {
    // HTML escape first
    let h = esc(sql);

    // 문자열 리터럴: '...'
    h = h.replace(/'([^']*)'/g, '<span class="str">\'$1\'</span>');

    // 숫자 (독립된 숫자만)
    h = h.replace(/\b(\d+\.?\d*)\b/g, '<span class="num">$1</span>');

    // 함수명: SUM, ROUND, COALESCE, IFNULL, COUNT, AVG, MAX, MIN, NULLIF, CASE, CONCAT 등
    const fns = ['SUM','ROUND','COALESCE','IFNULL','COUNT','AVG','MAX','MIN','NULLIF','CONCAT','CASE','LENGTH','TRIM','UPPER','LOWER','CAST','CONVERT','DATE_FORMAT','SUBSTRING','LEFT','RIGHT','REPLACE'];
    for (const fn of fns) {
        const re = new RegExp('\\b(' + fn + ')\\s*(?=\\(|\\s+WHEN)', 'gi');
        h = h.replace(re, '<span class="fn">$1</span>');
    }

    // 주요 SQL 키워드
    const keywords = ['SELECT','DISTINCT','FROM','WHERE','AND','OR','NOT','IN','IS','NULL','BETWEEN','LIKE','EXISTS','GROUP\\s+BY','ORDER\\s+BY','HAVING','LIMIT','OFFSET','ASC','DESC','WHEN','THEN','ELSE','END','AS','ON','USING','UNION','ALL','INSERT','INTO','UPDATE','DELETE','SET','VALUES','LEFT\\s+JOIN','RIGHT\\s+JOIN','INNER\\s+JOIN','FULL\\s+JOIN','CROSS\\s+JOIN','JOIN','NATURAL'];
    for (const kw of keywords) {
        const re = new RegExp('\\b(' + kw + ')\\b', 'gi');
        h = h.replace(re, (match) => {
            // AS 뒤의 alias는 별도 처리하므로 여기서는 키워드만
            return '<span class="kw">' + match.toUpperCase() + '</span>';
        });
    }

    // AS 뒤의 alias 하이라이팅
    h = h.replace(/<span class="kw">AS<\/span>\s+(\S+)/g, '<span class="kw">AS</span> <span class="alias">$1</span>');

    return h;
}

// ============================================================
// SQL Feedback (정확해요 / SQL 수정하기)
// ============================================================
function getMsgData(msgId) {
    // Find the bot message element that contains this msgId
    const sqlPre = document.getElementById(msgId + '_sqlPre');
    if (!sqlPre) return null;
    const botEl = sqlPre.closest('.msg-bot');
    return botEl ? botEl._nlqData : null;
}

async function submitFeedback(msgId, type, correctedSql) {
    const data = getMsgData(msgId);
    if (!data) return alert('데이터를 찾을 수 없습니다.');

    const body = {
        query_text: data.query,
        original_sql: data.sql,
        corrected_sql: correctedSql || data.sql,
        feedback_type: type,
    };

    try {
        const res = await fetch('/api/feedback', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        });
        const result = await res.json();
        if (result.success) {
            // Update UI
            const fbBar = document.getElementById(msgId + '_fbBar');
            if (fbBar) {
                if (type === 'correct') {
                    fbBar.innerHTML = `<span class="fb-done-msg"><i class="fas fa-check-circle"></i> 학습 데이터에 반영되었습니다. 감사합니다!</span>`;
                } else {
                    fbBar.innerHTML = `<span class="fb-done-msg"><i class="fas fa-check-circle"></i> 수정된 SQL이 학습에 반영되었습니다!</span>`;
                }
            }
        } else {
            alert('피드백 저장 실패: ' + (result.error || ''));
        }
    } catch(e) {
        alert('피드백 전송 오류: ' + e.message);
    }
}

function openSqlEditor(msgId) {
    const editor = document.getElementById(msgId + '_editor');
    const ta = document.getElementById(msgId + '_editorTa');
    const correctBtn = document.getElementById(msgId + '_fbCorrect');
    const editBtn = document.getElementById(msgId + '_fbEdit');
    if (!editor) return;

    editor.classList.add('active');
    editBtn.classList.add('selected');
    if (correctBtn) correctBtn.style.display = 'none';
    editBtn.innerHTML = '<i class="fas fa-pen"></i> 수정 중...';
    editBtn.onclick = null; // disable re-click

    // Focus editor
    setTimeout(() => ta.focus(), 100);
}

function cancelSqlEdit(msgId) {
    const editor = document.getElementById(msgId + '_editor');
    const correctBtn = document.getElementById(msgId + '_fbCorrect');
    const editBtn = document.getElementById(msgId + '_fbEdit');
    if (!editor) return;

    editor.classList.remove('active');
    if (correctBtn) correctBtn.style.display = '';
    editBtn.classList.remove('selected');
    editBtn.innerHTML = '<i class="fas fa-pen"></i> SQL 수정하기';
    editBtn.onclick = () => openSqlEditor(msgId);

    // Reset editor status
    const status = document.getElementById(msgId + '_editorStatus');
    if (status) status.textContent = '';
}

async function executeEditedSql(msgId) {
    const ta = document.getElementById(msgId + '_editorTa');
    const status = document.getElementById(msgId + '_editorStatus');
    if (!ta) return;

    const sql = ta.value.trim();
    if (!sql) return alert('SQL을 입력하세요.');

    status.textContent = '실행 중...';
    status.style.color = '#fbbf24';

    try {
        const res = await fetch('/api/execute-sql', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sql }),
        });
        const result = await res.json();

        if (!res.ok || result.error) {
            status.textContent = '❌ 오류: ' + (result.error || '');
            status.style.color = '#fca5a5';
            return;
        }

        status.textContent = `✅ ${result.rowCount}행, ${result.executionTimeMs}ms`;
        status.style.color = '#86efac';

        // Update the original data to reflect edited SQL results
        const data = getMsgData(msgId);
        const oldQuery = data ? data.query : '';

        // Add result to chat as new bot message
        msgCounter++;
        const newId = 'msg' + msgCounter;
        const newData = {
            query: oldQuery,
            sql: sql,
            explanation: `사용자가 수정한 SQL 실행 결과 (${result.rowCount}행, ${result.executionTimeMs}ms)`,
            chartType: (data && data.chartType) || 'table',
            chartConfig: (data && data.chartConfig) || {},
            data: result.data || [],
            rowCount: result.rowCount,
            executionTimeMs: result.executionTimeMs,
        };
        appendBotMessage(newData);
        scrollToBottom();

        // Auto-submit corrected feedback
        await submitFeedback(msgId, 'corrected', sql);

        // Close editor
        const editor = document.getElementById(msgId + '_editor');
        if (editor) editor.classList.remove('active');

    } catch(e) {
        status.textContent = '❌ 연결 오류: ' + e.message;
        status.style.color = '#fca5a5';
    }
}

// ============================================================
// History (이력 관리)
// ============================================================
async function loadHistory() {
    try {
        const res = await fetch('/api/history?limit=30');
        const data = await res.json();
        historyCache = data;
        renderHistoryList(data);
    } catch(e) {
        console.error('이력 로드 실패:', e);
    }
}

function renderHistoryList(items) {
    const container = document.getElementById('historyList');
    if (!items || items.length === 0) {
        container.innerHTML = '<div class="history-empty"><i class="fas fa-inbox"></i><br>아직 질의 이력이 없습니다</div>';
        return;
    }
    let html = '';
    items.forEach(item => {
        const isSuccess = item.status === 'SUCCESS';
        const icon = isSuccess ? 'fa-check' : 'fa-times';
        const iconCls = isSuccess ? 'success' : 'failed';
        const time = formatHistoryTime(item.created_at);
        const meta = isSuccess
            ? `${item.row_count}행 · ${item.execution_time_ms}ms · ${time}`
            : `실패 · ${time}`;
        html += `
            <div class="history-item" data-id="${item.id}" onclick="restoreHistory(${item.id})">
                <div class="history-item-icon ${iconCls}"><i class="fas ${icon}"></i></div>
                <div class="history-item-text">
                    <div class="history-item-query">${esc(item.query_text)}</div>
                    <div class="history-item-meta">${meta}</div>
                </div>
                <div class="history-item-del" onclick="event.stopPropagation();deleteHistory(${item.id})" title="삭제">
                    <i class="fas fa-times"></i>
                </div>
            </div>`;
    });
    container.innerHTML = html;
}

function formatHistoryTime(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    const now = new Date();
    const diff = now - d;
    if (diff < 60000) return '방금 전';
    if (diff < 3600000) return Math.floor(diff/60000) + '분 전';
    if (diff < 86400000) return Math.floor(diff/3600000) + '시간 전';
    if (diff < 604800000) return Math.floor(diff/86400000) + '일 전';
    return (d.getMonth()+1) + '/' + d.getDate() + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

async function restoreHistory(id) {
    // 사이드바에서 active 표시
    document.querySelectorAll('.history-item').forEach(el => el.classList.remove('active'));
    const target = document.querySelector(`.history-item[data-id="${id}"]`);
    if (target) target.classList.add('active');

    try {
        const res = await fetch('/api/history/' + id);
        const item = await res.json();
        if (item.error) { alert('이력을 불러올 수 없습니다.'); return; }

        // Welcome 숨기기
        const welcome = document.getElementById('welcomeSection');
        if (welcome) welcome.style.display = 'none';

        const chatArea = document.getElementById('chatArea');

        // 사용자 메시지 표시
        const userMsg = document.createElement('div');
        userMsg.className = 'msg-user fade-in';
        userMsg.textContent = item.query_text;
        chatArea.appendChild(userMsg);

        if (item.status === 'SUCCESS') {
            // 성공 이력 → 결과 표시
            appendBotMessage({
                query: item.query_text,
                sql: item.generated_sql,
                explanation: item.explanation,
                chartType: item.chart_type,
                chartConfig: item.chart_config || {},
                data: item.result_data || [],
                rowCount: item.row_count,
                executionTimeMs: item.execution_time_ms,
            });
        } else {
            // 실패 이력
            appendErrorMessage(item.error_message || '실행 실패');
        }

        closeSidebar();
        scrollToBottom();
    } catch(e) {
        alert('이력 불러오기 오류: ' + e.message);
    }
}

async function deleteHistory(id) {
    if (!confirm('이 이력을 삭제하시겠습니까?')) return;
    try {
        await fetch('/api/history/' + id, { method: 'DELETE' });
        await loadHistory();
    } catch(e) { alert('삭제 실패: ' + e.message); }
}

async function clearAllHistory() {
    if (!confirm('전체 질의 이력을 삭제하시겠습니까?')) return;
    try {
        await fetch('/api/history', { method: 'DELETE' });
        await loadHistory();
    } catch(e) { alert('삭제 실패: ' + e.message); }
}
</script>
