<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profit AI - 수익성분석 자연어 조회</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Noto Sans KR', sans-serif; }
        .chat-container { height: calc(100vh - 260px); }
        .msg-enter { animation: msgSlide 0.3s ease-out; }
        @keyframes msgSlide { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
        .typing-dots span { animation: blink 1.4s infinite both; }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }
        .glass { background: rgba(255,255,255,0.7); backdrop-filter: blur(12px); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .data-table { font-size: 12px; }
        .data-table th { position: sticky; top: 0; z-index: 1; }
        .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; font-weight: 600; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-50 min-h-screen">

<!-- Header -->
<header class="glass border-b border-slate-200 px-6 py-3 flex items-center justify-between sticky top-0 z-50">
    <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-blue-600 rounded-lg flex items-center justify-center">
            <i class="fas fa-chart-line text-white text-sm"></i>
        </div>
        <div>
            <h1 class="text-lg font-bold text-slate-800">Profit AI</h1>
            <p class="text-xs text-slate-500">수익성분석 자연어 조회 시스템</p>
        </div>
    </div>
    <div id="statusBar" class="flex items-center gap-4 text-xs">
        <span id="dbStatus" class="flex items-center gap-1"><i class="fas fa-circle text-gray-300"></i> DB</span>
        <span id="aiStatus" class="flex items-center gap-1"><i class="fas fa-circle text-gray-300"></i> AI</span>
        <span id="rowCount" class="text-slate-500">-</span>
    </div>
</header>

<!-- Main Content -->
<main class="max-w-6xl mx-auto px-4 pt-4">

    <!-- Chat Area -->
    <div id="chatContainer" class="chat-container overflow-y-auto pb-4 space-y-4">
        <!-- Welcome -->
        <div class="msg-enter flex justify-center pt-8">
            <div class="text-center max-w-lg">
                <div class="w-16 h-16 bg-blue-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-robot text-blue-600 text-2xl"></i>
                </div>
                <h2 class="text-xl font-bold text-slate-800 mb-2">무엇이든 물어보세요</h2>
                <p class="text-sm text-slate-500 mb-6">자연어로 수익성 데이터를 분석합니다.<br>질문을 입력하면 AI가 SQL을 생성하고 결과를 시각화합니다.</p>
                <div id="suggestions" class="flex flex-wrap gap-2 justify-center"></div>
            </div>
        </div>
    </div>

    <!-- Input Area -->
    <div class="glass border border-slate-200 rounded-2xl p-3 sticky bottom-4 shadow-lg">
        <div class="flex items-center gap-2">
            <input id="queryInput" type="text" placeholder="예: 플랜트별 총매출 현황을 알려줘"
                class="flex-1 bg-transparent px-4 py-3 text-sm outline-none placeholder-slate-400"
                autocomplete="off" />
            <button id="sendBtn" onclick="sendQuery()"
                class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-3 rounded-xl text-sm font-medium transition flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                <i class="fas fa-paper-plane"></i> 전송
            </button>
        </div>
    </div>
</main>

<script>
// ============================================================
// State
// ============================================================
let chartInstances = {};
let msgId = 0;

// ============================================================
// Init
// ============================================================
window.addEventListener('DOMContentLoaded', async () => {
    // Status check
    try {
        const res = await fetch('/api/status');
        const data = await res.json();
        document.getElementById('dbStatus').innerHTML = '<i class="fas fa-circle text-green-500"></i> DB 연결됨';
        document.getElementById('aiStatus').innerHTML = `<i class="fas fa-circle text-green-500"></i> ${data.ai}`;
        document.getElementById('rowCount').textContent = `${Number(data.totalRows).toLocaleString()}행`;
    } catch (e) {
        document.getElementById('dbStatus').innerHTML = '<i class="fas fa-circle text-red-500"></i> DB 오류';
    }

    // Suggestions
    try {
        const res = await fetch('/api/suggestions');
        const suggestions = await res.json();
        const el = document.getElementById('suggestions');
        suggestions.slice(0, 6).forEach(s => {
            const btn = document.createElement('button');
            btn.className = 'text-xs bg-white border border-slate-200 hover:border-blue-400 hover:text-blue-600 text-slate-600 px-3 py-2 rounded-full transition';
            btn.textContent = s;
            btn.onclick = () => { document.getElementById('queryInput').value = s; sendQuery(); };
            el.appendChild(btn);
        });
    } catch (e) {}

    // Enter key
    document.getElementById('queryInput').addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.isComposing) sendQuery();
    });
});

// ============================================================
// Send Query
// ============================================================
async function sendQuery() {
    const input = document.getElementById('queryInput');
    const query = input.value.trim();
    if (!query) return;

    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    input.value = '';

    // User message
    addMessage('user', query);

    // Typing indicator
    const typingId = addTyping();

    try {
        const res = await fetch('/api/nlq', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query }),
        });
        const data = await res.json();
        removeTyping(typingId);

        if (!res.ok || data.error) {
            addMessage('error', data.error || '오류가 발생했습니다.');
        } else {
            addResultMessage(data);
        }
    } catch (err) {
        removeTyping(typingId);
        addMessage('error', '서버 연결 오류: ' + err.message);
    } finally {
        btn.disabled = false;
        input.focus();
    }
}

// ============================================================
// Message Rendering
// ============================================================
function addMessage(type, text) {
    const container = document.getElementById('chatContainer');
    const div = document.createElement('div');
    div.className = 'msg-enter';

    if (type === 'user') {
        div.innerHTML = `
            <div class="flex justify-end">
                <div class="bg-blue-600 text-white px-4 py-3 rounded-2xl rounded-br-md max-w-lg text-sm">${escHtml(text)}</div>
            </div>`;
    } else if (type === 'error') {
        div.innerHTML = `
            <div class="flex justify-start">
                <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-2xl rounded-bl-md max-w-lg text-sm">
                    <i class="fas fa-exclamation-circle mr-1"></i>${escHtml(text)}
                </div>
            </div>`;
    }
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function addTyping() {
    const id = 'typing-' + (++msgId);
    const container = document.getElementById('chatContainer');
    const div = document.createElement('div');
    div.id = id;
    div.className = 'msg-enter flex justify-start';
    div.innerHTML = `
        <div class="bg-white border border-slate-200 px-4 py-3 rounded-2xl rounded-bl-md text-sm text-slate-500 flex items-center gap-2">
            <i class="fas fa-robot text-blue-500"></i>
            분석 중
            <span class="typing-dots"><span class="inline-block w-1.5 h-1.5 bg-slate-400 rounded-full"></span>
            <span class="inline-block w-1.5 h-1.5 bg-slate-400 rounded-full"></span>
            <span class="inline-block w-1.5 h-1.5 bg-slate-400 rounded-full"></span></span>
        </div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return id;
}

function removeTyping(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
}

// ============================================================
// Result Message (표 + 차트 + SQL)
// ============================================================
function addResultMessage(data) {
    const rid = 'result-' + (++msgId);
    const container = document.getElementById('chatContainer');
    const div = document.createElement('div');
    div.className = 'msg-enter';

    const hasData = data.data && data.data.length > 0;
    const columns = hasData ? Object.keys(data.data[0]) : [];

    div.innerHTML = `
    <div class="flex justify-start w-full">
        <div class="bg-white border border-slate-200 rounded-2xl rounded-bl-md w-full max-w-5xl shadow-sm overflow-hidden">
            <!-- Explanation -->
            <div class="px-5 pt-4 pb-2">
                <div class="flex items-start gap-2">
                    <i class="fas fa-robot text-blue-500 mt-0.5"></i>
                    <p class="text-sm text-slate-700">${escHtml(data.explanation || '')}</p>
                </div>
                <div class="flex items-center gap-3 mt-2 text-xs text-slate-400">
                    <span><i class="fas fa-table mr-1"></i>${data.rowCount}행</span>
                    <span><i class="fas fa-clock mr-1"></i>${data.executionTimeMs}ms</span>
                </div>
            </div>

            <!-- Tabs -->
            <div class="border-b border-slate-100 px-5 flex gap-4">
                <button class="tab-btn py-2 text-sm tab-active" data-rid="${rid}" data-tab="chart" onclick="switchTab(this)">
                    <i class="fas fa-chart-bar mr-1"></i>차트
                </button>
                <button class="tab-btn py-2 text-sm text-slate-400 hover:text-slate-600" data-rid="${rid}" data-tab="table" onclick="switchTab(this)">
                    <i class="fas fa-table mr-1"></i>표
                </button>
                <button class="tab-btn py-2 text-sm text-slate-400 hover:text-slate-600" data-rid="${rid}" data-tab="sql" onclick="switchTab(this)">
                    <i class="fas fa-code mr-1"></i>SQL
                </button>
            </div>

            <!-- Tab Panels -->
            <div id="${rid}-chart" class="tab-panel p-4" style="min-height:300px;">
                <canvas id="${rid}-canvas" height="280"></canvas>
            </div>
            <div id="${rid}-table" class="tab-panel p-4 hidden" style="max-height:400px; overflow:auto;">
                ${hasData ? buildTable(columns, data.data) : '<p class="text-sm text-slate-400">데이터가 없습니다.</p>'}
            </div>
            <div id="${rid}-sql" class="tab-panel p-4 hidden">
                <pre class="bg-slate-900 text-green-400 text-xs p-4 rounded-lg overflow-x-auto whitespace-pre-wrap">${escHtml(data.sql)}</pre>
            </div>
        </div>
    </div>`;

    container.appendChild(div);
    container.scrollTop = container.scrollHeight;

    // Render chart
    if (hasData) {
        setTimeout(() => renderChart(rid, data), 100);
    }
}

// ============================================================
// Tab Switch
// ============================================================
function switchTab(btn) {
    const rid = btn.dataset.rid;
    const tab = btn.dataset.tab;
    // Reset all tabs
    btn.parentElement.querySelectorAll('.tab-btn').forEach(b => {
        b.classList.remove('tab-active');
        b.classList.add('text-slate-400');
    });
    btn.classList.add('tab-active');
    btn.classList.remove('text-slate-400');
    // Show panel
    ['chart','table','sql'].forEach(t => {
        const panel = document.getElementById(`${rid}-${t}`);
        if (panel) panel.classList.toggle('hidden', t !== tab);
    });
}

// ============================================================
// Build HTML Table
// ============================================================
function buildTable(columns, rows) {
    let html = '<table class="data-table w-full text-left border-collapse">';
    html += '<thead><tr>';
    columns.forEach(c => {
        html += `<th class="bg-slate-50 px-3 py-2 border-b border-slate-200 text-slate-600 font-medium whitespace-nowrap">${escHtml(c)}</th>`;
    });
    html += '</tr></thead><tbody>';
    rows.forEach((row, i) => {
        html += `<tr class="${i%2===0?'bg-white':'bg-slate-50/50'} hover:bg-blue-50/50 transition">`;
        columns.forEach(c => {
            let val = row[c];
            if (val === null || val === undefined) val = '-';
            else if (typeof val === 'number') val = val.toLocaleString('ko-KR');
            html += `<td class="px-3 py-1.5 border-b border-slate-100 whitespace-nowrap">${escHtml(String(val))}</td>`;
        });
        html += '</tr>';
    });
    html += '</tbody></table>';
    return html;
}

// ============================================================
// Render Chart
// ============================================================
function renderChart(rid, data) {
    const canvas = document.getElementById(`${rid}-canvas`);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');

    const chartType = data.chartType || 'bar';
    const config = data.chartConfig || {};
    const rows = data.data || [];
    if (rows.length === 0) return;

    const columns = Object.keys(rows[0]);
    const labelCol = config.labelColumn || columns[0];
    let dataCols = config.dataColumns || columns.filter(c => c !== labelCol);

    // Only use numeric columns
    dataCols = dataCols.filter(c => {
        const v = rows[0][c];
        return typeof v === 'number' || (typeof v === 'string' && !isNaN(parseFloat(v)));
    });
    if (dataCols.length === 0) dataCols = columns.filter(c => c !== labelCol && typeof rows[0][c] === 'number');

    const labels = rows.map(r => String(r[labelCol] ?? ''));

    const colors = [
        'rgba(59,130,246,0.7)', 'rgba(16,185,129,0.7)', 'rgba(245,158,11,0.7)',
        'rgba(239,68,68,0.7)', 'rgba(139,92,246,0.7)', 'rgba(236,72,153,0.7)',
        'rgba(20,184,166,0.7)', 'rgba(249,115,22,0.7)', 'rgba(99,102,241,0.7)',
        'rgba(34,197,94,0.7)',
    ];
    const borderColors = colors.map(c => c.replace('0.7', '1'));

    let datasets;
    if (chartType === 'pie' || chartType === 'doughnut') {
        const col = dataCols[0];
        datasets = [{
            data: rows.map(r => Number(r[col]) || 0),
            backgroundColor: colors.slice(0, rows.length),
            borderColor: borderColors.slice(0, rows.length),
            borderWidth: 1,
        }];
    } else {
        datasets = dataCols.map((col, i) => ({
            label: col,
            data: rows.map(r => Number(r[col]) || 0),
            backgroundColor: colors[i % colors.length],
            borderColor: borderColors[i % borderColors.length],
            borderWidth: chartType === 'line' ? 2 : 1,
            tension: 0.3,
            fill: false,
        }));
    }

    // Destroy old
    if (chartInstances[rid]) chartInstances[rid].destroy();

    chartInstances[rid] = new Chart(ctx, {
        type: chartType === 'doughnut' ? 'doughnut' : chartType,
        data: { labels, datasets },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                title: {
                    display: !!(config.title),
                    text: config.title || '',
                    font: { size: 14, family: 'Noto Sans KR' },
                },
                legend: {
                    display: chartType === 'pie' || chartType === 'doughnut' || dataCols.length > 1,
                    position: chartType === 'pie' || chartType === 'doughnut' ? 'right' : 'top',
                    labels: { font: { size: 11, family: 'Noto Sans KR' } },
                },
                tooltip: {
                    callbacks: {
                        label: function(ctx) {
                            let val = ctx.parsed.y ?? ctx.parsed;
                            if (typeof val === 'number') val = val.toLocaleString('ko-KR');
                            return `${ctx.dataset.label || ''}: ${val}`;
                        }
                    }
                }
            },
            scales: chartType === 'pie' || chartType === 'doughnut' ? {} : {
                x: {
                    ticks: { font: { size: 10, family: 'Noto Sans KR' }, maxRotation: 45 },
                    grid: { display: false },
                },
                y: {
                    ticks: {
                        font: { size: 10 },
                        callback: v => Number(v).toLocaleString('ko-KR'),
                    },
                    grid: { color: 'rgba(0,0,0,0.04)' },
                },
            },
        },
    });
}

// ============================================================
// Utils
// ============================================================
function escHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
}
</script>
</body>
</html>
