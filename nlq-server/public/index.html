<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수익성분석 AI 챗봇</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap');
        *{font-family:'Noto Sans KR',sans-serif;box-sizing:border-box;margin:0;padding:0;}
        html,body{height:100%;overflow:hidden;}
        body{background:#f5f7fb;}

        /* Sidebar */
        .sidebar{
            position:fixed;left:0;top:0;bottom:0;width:280px;
            background:#1e1b4b;color:#fff;z-index:100;
            transform:translateX(-100%);transition:transform .3s ease;
        }
        .sidebar.open{transform:translateX(0);}
        .sidebar-overlay{
            position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:99;
            opacity:0;pointer-events:none;transition:opacity .3s;
        }
        .sidebar-overlay.active{opacity:1;pointer-events:auto;}
        .sidebar-menu-item{
            display:flex;align-items:center;gap:12px;padding:12px 20px;
            font-size:14px;color:#c7d2fe;cursor:pointer;transition:all .15s;
            border-radius:8px;margin:2px 10px;
        }
        .sidebar-menu-item:hover{background:rgba(255,255,255,0.1);color:#fff;}
        .sidebar-menu-item.active{background:rgba(99,102,241,0.3);color:#fff;font-weight:600;}
        .sidebar-menu-item i{width:20px;text-align:center;font-size:15px;}
        .sidebar-divider{height:1px;background:rgba(255,255,255,0.1);margin:12px 16px;}

        /* Main layout */
        .main-wrapper{
            display:flex;flex-direction:column;height:100vh;
        }

        /* Top bar */
        .top-bar{
            background:#fff;border-bottom:1px solid #e5e7eb;padding:12px 20px;
            display:flex;align-items:center;gap:12px;flex-shrink:0;
        }
        .hamburger-btn{
            width:38px;height:38px;display:flex;align-items:center;justify-content:center;
            border-radius:8px;border:1px solid #e5e7eb;background:#fff;cursor:pointer;
            transition:all .15s;color:#475569;font-size:16px;
        }
        .hamburger-btn:hover{background:#f1f5f9;color:#4f46e5;}
        .status-pill{
            display:flex;align-items:center;gap:6px;
            font-size:12px;color:#64748b;background:#f8fafc;
            padding:5px 12px;border-radius:20px;border:1px solid #e5e7eb;
        }
        .status-pill .dot{width:7px;height:7px;border-radius:50%;background:#94a3b8;}
        .status-pill .dot.green{background:#22c55e;box-shadow:0 0 5px rgba(34,197,94,0.4);}

        /* Chat area */
        .chat-area{
            flex:1;overflow-y:auto;padding:24px;
            display:flex;flex-direction:column;gap:20px;
        }

        /* Welcome section */
        .welcome-section{
            display:flex;flex-direction:column;align-items:center;
            padding:40px 20px 20px;text-align:center;
        }
        .welcome-icon{
            width:64px;height:64px;border-radius:16px;
            background:linear-gradient(135deg,#4f46e5,#7c3aed);
            display:flex;align-items:center;justify-content:center;
            font-size:28px;color:#fff;margin-bottom:16px;
            box-shadow:0 4px 16px rgba(79,70,229,0.25);
        }

        /* Suggestion chips */
        .chip{
            display:inline-block;border:1px solid #c7d2fe;color:#4f46e5;
            background:#eef2ff;font-size:13px;padding:8px 16px;border-radius:20px;
            cursor:pointer;transition:all .2s;white-space:nowrap;
        }
        .chip:hover{background:#4f46e5;color:#fff;border-color:#4f46e5;transform:translateY(-1px);box-shadow:0 2px 8px rgba(79,70,229,0.2);}

        /* Chat messages */
        .msg-user{
            align-self:flex-end;max-width:600px;
            background:linear-gradient(135deg,#4f46e5,#6366f1);color:#fff;
            padding:12px 18px;border-radius:18px 18px 4px 18px;
            font-size:14px;line-height:1.6;box-shadow:0 2px 8px rgba(79,70,229,0.15);
        }
        .msg-bot{
            align-self:flex-start;max-width:820px;min-width:340px;width:100%;
        }
        .msg-bot-inner{
            background:#fff;border:1px solid #e5e7eb;
            padding:0;border-radius:16px;overflow:hidden;
            box-shadow:0 1px 4px rgba(0,0,0,0.04);
        }
        .msg-bot-header{
            padding:14px 18px;border-bottom:1px solid #f1f5f9;
            display:flex;align-items:flex-start;gap:10px;
        }
        .bot-avatar{
            width:32px;height:32px;border-radius:8px;flex-shrink:0;
            background:linear-gradient(135deg,#4f46e5,#7c3aed);
            display:flex;align-items:center;justify-content:center;
            color:#fff;font-size:14px;
        }
        .msg-bot-explanation{font-size:13px;color:#475569;line-height:1.6;flex:1;}
        .msg-bot-meta{
            display:flex;align-items:center;gap:8px;margin-top:6px;
        }
        .meta-badge{
            font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;
        }
        .meta-badge.rows{background:#dbeafe;color:#2563eb;}
        .meta-badge.time{background:#f1f5f9;color:#64748b;}

        /* Result tabs inside bot message */
        .res-tabs{
            display:flex;border-bottom:1px solid #f1f5f9;padding:0 16px;background:#fafbfc;
        }
        .res-tab{
            padding:10px 16px;font-size:13px;cursor:pointer;border-bottom:2.5px solid transparent;
            color:#94a3b8;transition:all .15s;font-weight:500;white-space:nowrap;
        }
        .res-tab:hover{color:#6366f1;}
        .res-tab.active{color:#4f46e5;border-bottom-color:#4f46e5;font-weight:600;}

        /* Result panels */
        .res-panel{display:none;}
        .res-panel.active{display:block;}

        /* Data table */
        .data-table{font-size:12px;border-collapse:collapse;width:100%;}
        .data-table th{
            background:#f8fafc;color:#475569;font-weight:600;padding:10px 14px;
            text-align:left;border-bottom:2px solid #e2e8f0;white-space:nowrap;
            position:sticky;top:0;z-index:1;
        }
        .data-table td{padding:10px 14px;border-bottom:1px solid #f1f5f9;white-space:nowrap;}
        .data-table tbody tr:hover{background:#f0f4ff;}

        /* Chart container */
        .chart-container{padding:16px;min-height:320px;position:relative;}

        /* SQL display */
        .sql-display{
            background:#0f172a;color:#86efac;font-size:12px;padding:16px;
            border-radius:0;overflow-x:auto;white-space:pre-wrap;
            line-height:1.7;font-family:'Fira Code','Consolas',monospace;
        }

        /* Suggestion chips bar (always visible above input) */
        .chips-bar{
            flex-shrink:0;background:#fff;border-top:1px solid #f1f5f9;
            padding:8px 20px 0;
            overflow-x:auto;
            -webkit-overflow-scrolling:touch;
        }
        .chips-bar::-webkit-scrollbar{height:0;display:none;}
        .chips-row{
            max-width:900px;margin:0 auto;
            display:flex;gap:8px;flex-wrap:wrap;justify-content:center;
        }
        .chip-sm{
            display:inline-block;border:1px solid #c7d2fe;color:#4f46e5;
            background:#eef2ff;font-size:12px;padding:5px 14px;border-radius:16px;
            cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0;
        }
        .chip-sm:hover{background:#4f46e5;color:#fff;border-color:#4f46e5;}

        /* Input bar */
        .input-bar{
            flex-shrink:0;background:#fff;border-top:1px solid #e5e7eb;
            padding:12px 20px 16px;
        }
        .input-row{
            max-width:900px;margin:0 auto;display:flex;gap:10px;align-items:center;
        }
        .input-field{
            flex:1;border:1.5px solid #e2e8f0;border-radius:12px;
            padding:12px 16px;font-size:14px;outline:none;
            transition:all .2s;background:#f8fafc;
        }
        .input-field:focus{border-color:#818cf8;box-shadow:0 0 0 3px rgba(129,140,248,0.12);background:#fff;}
        .send-btn{
            width:44px;height:44px;border-radius:12px;border:none;
            background:linear-gradient(135deg,#4f46e5,#6366f1);
            color:#fff;font-size:16px;cursor:pointer;
            display:flex;align-items:center;justify-content:center;
            transition:all .2s;flex-shrink:0;
        }
        .send-btn:hover{box-shadow:0 4px 12px rgba(79,70,229,0.3);transform:translateY(-1px);}
        .send-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none;}
        .mode-toggle{
            font-size:12px;color:#94a3b8;cursor:pointer;padding:4px 10px;
            border-radius:6px;border:1px solid #e5e7eb;background:#fff;
            transition:all .15s;flex-shrink:0;
        }
        .mode-toggle:hover{color:#4f46e5;border-color:#c7d2fe;}
        .mode-toggle.active{color:#4f46e5;background:#eef2ff;border-color:#c7d2fe;font-weight:600;}

        /* SQL textarea mode */
        .sql-textarea{
            flex:1;border:1.5px solid #e2e8f0;border-radius:12px;
            padding:12px 16px;font-size:13px;outline:none;
            transition:all .2s;background:#f8fafc;resize:none;
            font-family:'Fira Code','Consolas',monospace;min-height:44px;max-height:120px;
        }
        .sql-textarea:focus{border-color:#818cf8;box-shadow:0 0 0 3px rgba(129,140,248,0.12);background:#fff;}

        /* Loading animation */
        .typing-indicator{display:flex;align-items:center;gap:4px;padding:8px 0;}
        .typing-dot{
            width:8px;height:8px;border-radius:50%;background:#a5b4fc;
            animation:bounce 1.4s ease-in-out infinite;
        }
        .typing-dot:nth-child(2){animation-delay:.2s;}
        .typing-dot:nth-child(3){animation-delay:.4s;}
        @keyframes bounce{
            0%,80%,100%{transform:translateY(0)}
            40%{transform:translateY(-8px)}
        }

        /* Scrollbar */
        .chat-area::-webkit-scrollbar{width:6px;}
        .chat-area::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px;}
        .table-scroll::-webkit-scrollbar{width:5px;height:5px;}
        .table-scroll::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px;}

        /* Fade-in */
        .fade-in{animation:fadeIn .3s ease-out;}
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    </style>
</head>
<body>

<!-- ========== SIDEBAR ========== -->
<div id="sidebarOverlay" class="sidebar-overlay" onclick="closeSidebar()"></div>
<aside id="sidebar" class="sidebar">
    <div class="p-5 pb-3">
        <div class="flex items-center justify-between mb-1">
            <h2 class="text-lg font-bold">수익성분석 AI</h2>
            <button onclick="closeSidebar()" class="text-indigo-300 hover:text-white text-lg"><i class="fas fa-times"></i></button>
        </div>
        <p class="text-xs text-indigo-300 opacity-80">ChatGPT API 기반 분석 시스템</p>
    </div>
    <div class="sidebar-divider"></div>

    <!-- Menu Items -->
    <nav class="py-2">
        <div class="sidebar-menu-item active" onclick="closeSidebar()">
            <i class="fas fa-comments"></i><span>자연어 질의</span>
        </div>
        <div class="sidebar-menu-item" onclick="alert('비주얼 쿼리 빌더 - 준비중');closeSidebar();">
            <i class="fas fa-th-large"></i><span>비주얼 쿼리 빌더</span>
            <span style="margin-left:auto;font-size:10px;background:rgba(255,255,255,0.15);padding:2px 8px;border-radius:10px;">준비중</span>
        </div>
        <div class="sidebar-menu-item" onclick="alert('PPT 분석 장표 생성 - 준비중');closeSidebar();">
            <i class="fas fa-file-powerpoint"></i><span>PPT 분석 장표 생성</span>
            <span style="margin-left:auto;font-size:10px;background:rgba(255,255,255,0.15);padding:2px 8px;border-radius:10px;">준비중</span>
        </div>
        <div class="sidebar-menu-item" onclick="alert('학습 관리 - 준비중');closeSidebar();">
            <i class="fas fa-graduation-cap"></i><span>학습 관리</span>
            <span style="margin-left:auto;font-size:10px;background:rgba(255,255,255,0.15);padding:2px 8px;border-radius:10px;">준비중</span>
        </div>
    </nav>

    <div class="sidebar-divider"></div>

    <!-- DB Info -->
    <div class="px-5 py-3">
        <p class="text-xs text-indigo-300 font-semibold mb-2 uppercase tracking-wider">시스템 정보</p>
        <div class="space-y-2 text-xs text-indigo-200">
            <div class="flex items-center gap-2">
                <span id="sideDbDot" class="dot" style="width:7px;height:7px;border-radius:50%;background:#94a3b8;display:inline-block;"></span>
                <span id="sideDbLabel">DB 연결 확인중</span>
            </div>
            <div class="flex items-center gap-2">
                <span id="sideAiDot" class="dot" style="width:7px;height:7px;border-radius:50%;background:#94a3b8;display:inline-block;"></span>
                <span id="sideAiLabel">ChatGPT API</span>
            </div>
            <div class="flex items-center gap-2">
                <i class="fas fa-microchip text-indigo-400" style="width:7px;text-align:center;font-size:10px;"></i>
                <span id="sideModelLabel">Model: -</span>
            </div>
            <div class="flex items-center gap-2">
                <i class="fas fa-database text-indigo-400" style="width:7px;text-align:center;font-size:10px;"></i>
                <span id="sideDataLabel">데이터: -</span>
            </div>
        </div>
    </div>

    <div class="sidebar-divider"></div>

    <!-- Schema toggle -->
    <div class="px-5 py-3">
        <div class="flex items-center gap-2 text-xs text-indigo-300 cursor-pointer hover:text-white" onclick="toggleSideSchema()">
            <i id="sideSchemaArrow" class="fas fa-caret-right transition-transform duration-200"></i>
            <span class="font-medium">테이블 스키마</span>
            <span class="opacity-60">(120컬럼)</span>
        </div>
        <div id="sideSchemaContent" class="hidden mt-2 max-h-48 overflow-y-auto text-xs" style="font-size:11px;">
            <table id="sideSchemaTable" class="w-full text-indigo-200" style="border-collapse:collapse;">
            </table>
        </div>
    </div>
</aside>

<!-- ========== MAIN ========== -->
<div class="main-wrapper">

    <!-- Top Bar -->
    <div class="top-bar">
        <button class="hamburger-btn" onclick="openSidebar()" title="메뉴">
            <i class="fas fa-bars"></i>
        </button>
        <h1 class="text-sm font-bold text-gray-800 mr-auto">수익성분석 AI</h1>

        <div class="status-pill">
            <span id="topDbDot" class="dot"></span>
            <span id="topDbLabel">DB</span>
        </div>
        <div class="status-pill">
            <span id="topAiDot" class="dot"></span>
            <span id="topAiLabel">AI</span>
        </div>
        <div class="status-pill hidden sm:flex">
            <span id="topDataLabel">데이터: -</span>
        </div>
    </div>

    <!-- Chat Area -->
    <div id="chatArea" class="chat-area">
        <!-- Welcome -->
        <div id="welcomeSection" class="welcome-section">
            <div class="welcome-icon">
                <i class="fas fa-robot"></i>
            </div>
            <h2 class="text-xl font-bold text-gray-800 mb-2">무엇이든 물어보세요</h2>
            <p class="text-sm text-gray-500 mb-1">자연어로 수익성 데이터를 분석합니다.</p>
            <p class="text-sm text-gray-400 mb-6">질문을 입력하면 AI가 SQL을 생성하고 결과를 시각화합니다.</p>

            <!-- Suggestion Chips -->
            <div class="flex flex-wrap justify-center gap-2 max-w-2xl" id="chipContainer"></div>
        </div>
    </div>

    <!-- Suggestion Chips Bar (always visible) -->
    <div class="chips-bar" id="chipsBar">
        <div class="chips-row" id="fixedChipContainer"></div>
    </div>

    <!-- Input Bar -->
    <div class="input-bar">
        <div class="input-row">
            <button id="modeToggle" class="mode-toggle" onclick="toggleInputMode()" title="직접 SQL 모드 전환">
                <i class="fas fa-code"></i> SQL
            </button>
            <input id="queryInput" type="text" class="input-field"
                placeholder="자연어로 질문을 입력하세요 (예: 플랜트별 총매출 현황을 알려줘)"
                autocomplete="off" />
            <textarea id="sqlInput" class="sql-textarea hidden"
                placeholder="SELECT ... FROM bw_profitability_data ..." rows="1"></textarea>
            <button id="sendBtn" class="send-btn" onclick="handleSend()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

</div>

<script>
// ============================================================
// State
// ============================================================
let charts = {}; // chartId -> Chart instance
let inputMode = 'nlq'; // 'nlq' or 'sql'
let isLoading = false;
let msgCounter = 0;

const SUGGESTIONS = [
    '플랜트별 총매출 현황을 알려줘',
    '제품계층1(PRODH1)별 매출 비중을 보여줘',
    '일자별 총매출 추이를 보여줘',
    '사업장별 총매출 TOP 10',
    '브랜드별 총매출과 BOX수량을 비교해줘',
    '유통경로별 총매출 구성비를 보여줘',
];

const SCHEMA_COLUMNS = [
    ['CALMONTH','VARCHAR(10)','달력연도/월'],['CALDAY','VARCHAR(10)','달력일'],
    ['CO_AREA','VARCHAR(20)','관리회계 영역'],['PROFIT_CTR','VARCHAR(20)','손익 센터'],
    ['DIVISION','VARCHAR(20)','제품군'],['PLANT','VARCHAR(10)','플랜트'],
    ['DISTR_CHAN','VARCHAR(10)','유통 경로'],['SALES_OFF','VARCHAR(20)','사업장'],
    ['MATL_TYPE','VARCHAR(10)','자재유형'],['PRODH1','VARCHAR(10)','제품계층1'],
    ['PRODH2','VARCHAR(20)','제품계층2'],['PRODH3','VARCHAR(20)','제품계층3'],
    ['ZBRAND','VARCHAR(20)','브랜드1'],['CUSTOMER','VARCHAR(20)','고객'],
    ['MATERIAL','VARCHAR(40)','자재'],['ZQTY_BOX','DECIMAL','수량(BOX)'],
    ['ZAMT001','DECIMAL','총매출'],['ZAMT003','DECIMAL','순매출'],
    ['ZAMT035','DECIMAL','매출총이익'],['ZAMT055','DECIMAL','영업이익'],
    ['ZAMT064','DECIMAL','경상이익'],
];

// ============================================================
// Init
// ============================================================
window.addEventListener('DOMContentLoaded', async () => {
    // Status check
    try {
        const res = await fetch('/api/status');
        const d = await res.json();
        // Top bar
        document.getElementById('topDbDot').classList.add('green');
        document.getElementById('topDbLabel').textContent = 'DB 연결';
        document.getElementById('topAiDot').classList.add('green');
        document.getElementById('topAiLabel').textContent = d.ai;
        document.getElementById('topDataLabel').textContent = '데이터: ' + Number(d.totalRows).toLocaleString() + '행';
        // Sidebar
        document.getElementById('sideDbDot').style.background = '#22c55e';
        document.getElementById('sideDbLabel').textContent = 'DB 연결됨';
        document.getElementById('sideAiDot').style.background = '#22c55e';
        document.getElementById('sideAiLabel').textContent = 'ChatGPT API 연결됨';
        document.getElementById('sideModelLabel').textContent = 'Model: ' + d.ai;
        document.getElementById('sideDataLabel').textContent = '데이터: ' + Number(d.totalRows).toLocaleString() + '행';
    } catch(e) {
        document.getElementById('topDbLabel').textContent = 'DB 오류';
    }

    // Suggestion chips - welcome area
    const cc = document.getElementById('chipContainer');
    SUGGESTIONS.forEach(s => {
        const btn = document.createElement('button');
        btn.className = 'chip';
        btn.textContent = s;
        btn.onclick = () => sendQuery(s);
        cc.appendChild(btn);
    });

    // Suggestion chips - fixed bar (always visible above input)
    const fc = document.getElementById('fixedChipContainer');
    SUGGESTIONS.forEach(s => {
        const btn = document.createElement('button');
        btn.className = 'chip-sm';
        btn.textContent = s;
        btn.onclick = () => sendQuery(s);
        fc.appendChild(btn);
    });

    // Schema table in sidebar
    const st = document.getElementById('sideSchemaTable');
    let sh = '';
    SCHEMA_COLUMNS.forEach(c => {
        sh += `<tr style="border-bottom:1px solid rgba(255,255,255,0.05)"><td style="padding:3px 4px;color:#a5b4fc;font-family:monospace;">${c[0]}</td><td style="padding:3px 4px;opacity:0.6;">${c[2]}</td></tr>`;
    });
    st.innerHTML = sh;

    // Enter key
    document.getElementById('queryInput').addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.isComposing && !isLoading) handleSend();
    });
    document.getElementById('sqlInput').addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey && !e.isComposing && !isLoading) { e.preventDefault(); handleSend(); }
    });
});

// ============================================================
// Sidebar
// ============================================================
function openSidebar() {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('sidebarOverlay').classList.add('active');
}
function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('active');
}
function toggleSideSchema() {
    const c = document.getElementById('sideSchemaContent');
    const a = document.getElementById('sideSchemaArrow');
    c.classList.toggle('hidden');
    a.style.transform = c.classList.contains('hidden') ? '' : 'rotate(90deg)';
}

// ============================================================
// Input Mode Toggle
// ============================================================
function toggleInputMode() {
    const btn = document.getElementById('modeToggle');
    const nlq = document.getElementById('queryInput');
    const sql = document.getElementById('sqlInput');
    if (inputMode === 'nlq') {
        inputMode = 'sql';
        nlq.classList.add('hidden');
        sql.classList.remove('hidden');
        btn.classList.add('active');
        sql.focus();
    } else {
        inputMode = 'nlq';
        sql.classList.add('hidden');
        nlq.classList.remove('hidden');
        btn.classList.remove('active');
        nlq.focus();
    }
}

// ============================================================
// Send
// ============================================================
function handleSend() {
    if (isLoading) return;
    if (inputMode === 'nlq') {
        const q = document.getElementById('queryInput').value.trim();
        if (!q) return;
        sendQuery(q);
    } else {
        const s = document.getElementById('sqlInput').value.trim();
        if (!s) return;
        sendQuery('직접 SQL 실행: ' + s);
    }
}

async function sendQuery(query) {
    if (isLoading) return;
    isLoading = true;

    const btn = document.getElementById('sendBtn');
    btn.disabled = true;

    // Hide welcome
    const welcome = document.getElementById('welcomeSection');
    if (welcome) welcome.style.display = 'none';

    // Clear inputs
    document.getElementById('queryInput').value = '';
    document.getElementById('sqlInput').value = '';

    const chatArea = document.getElementById('chatArea');

    // User message
    const userMsg = document.createElement('div');
    userMsg.className = 'msg-user fade-in';
    userMsg.textContent = query;
    chatArea.appendChild(userMsg);

    // Typing indicator
    const typingEl = document.createElement('div');
    typingEl.className = 'msg-bot fade-in';
    typingEl.innerHTML = `
        <div style="display:flex;align-items:center;gap:10px;padding:12px 0;">
            <div class="bot-avatar"><i class="fas fa-robot"></i></div>
            <div class="typing-indicator">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        </div>`;
    chatArea.appendChild(typingEl);
    scrollToBottom();

    try {
        const res = await fetch('/api/nlq', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query }),
        });
        const data = await res.json();

        // Remove typing
        typingEl.remove();

        if (!res.ok || data.error) {
            appendErrorMessage(data.error || '서버 오류가 발생했습니다.');
        } else {
            appendBotMessage(data);
        }
    } catch(err) {
        typingEl.remove();
        appendErrorMessage('서버 연결 오류: ' + err.message);
    } finally {
        isLoading = false;
        btn.disabled = false;
    }
}

// ============================================================
// Append Bot Message (Result)
// ============================================================
function appendBotMessage(data) {
    msgCounter++;
    const id = 'msg' + msgCounter;
    const chatArea = document.getElementById('chatArea');

    const botMsg = document.createElement('div');
    botMsg.className = 'msg-bot fade-in';

    // Build tabs content
    const chartId = 'chart_' + id;
    const hasChart = data.chartType && data.chartType !== 'table';

    let tabsHtml = `
        <div class="res-tabs">
            <div class="res-tab ${hasChart ? 'active' : ''}" data-panel="${id}_chart" onclick="switchTab(this,'${id}')" ${!hasChart ? 'style="display:none"' : ''}>
                <i class="fas fa-chart-bar mr-1"></i>차트
            </div>
            <div class="res-tab ${!hasChart ? 'active' : ''}" data-panel="${id}_table" onclick="switchTab(this,'${id}')">
                <i class="fas fa-table mr-1"></i>표
            </div>
            <div class="res-tab" data-panel="${id}_sql" onclick="switchTab(this,'${id}')">
                <i class="fas fa-code mr-1"></i>SQL
            </div>
        </div>`;

    // Table HTML
    let tableHtml = '<div class="p-4 text-center text-sm text-gray-400">결과가 없습니다.</div>';
    if (data.data && data.data.length > 0) {
        const cols = Object.keys(data.data[0]);
        let t = '<div class="table-scroll" style="max-height:400px;overflow:auto;"><table class="data-table"><thead><tr><th>#</th>';
        cols.forEach(c => t += `<th>${esc(c)}</th>`);
        t += '</tr></thead><tbody>';
        data.data.forEach((row, i) => {
            t += `<tr><td class="text-gray-400">${i+1}</td>`;
            cols.forEach(c => {
                let v = row[c];
                if (v === null || v === undefined) v = '-';
                else if (typeof v === 'number') v = v.toLocaleString('ko-KR');
                const align = typeof row[c] === 'number' ? 'text-right font-mono' : '';
                t += `<td class="${align}">${esc(String(v))}</td>`;
            });
            t += '</tr>';
        });
        t += '</tbody></table></div>';
        tableHtml = t;
    }

    botMsg.innerHTML = `
        <div class="msg-bot-inner">
            <div class="msg-bot-header">
                <div class="bot-avatar"><i class="fas fa-robot"></i></div>
                <div style="flex:1;">
                    <div class="msg-bot-explanation">${esc(data.explanation || '')}</div>
                    <div class="msg-bot-meta">
                        <span class="meta-badge rows"><i class="fas fa-table mr-1"></i>${data.rowCount || 0}행</span>
                        <span class="meta-badge time"><i class="fas fa-clock mr-1"></i>${data.executionTimeMs || 0}ms</span>
                    </div>
                </div>
            </div>
            ${tabsHtml}
            <div id="${id}_chart" class="res-panel ${hasChart ? 'active' : ''}" style="${!hasChart ? 'display:none' : ''}">
                <div class="chart-container"><canvas id="${chartId}" height="300"></canvas></div>
            </div>
            <div id="${id}_table" class="res-panel ${!hasChart ? 'active' : ''}">
                ${tableHtml}
            </div>
            <div id="${id}_sql" class="res-panel">
                <pre class="sql-display">${esc(data.sql || '')}</pre>
            </div>
        </div>`;

    chatArea.appendChild(botMsg);
    scrollToBottom();

    // Render chart if applicable
    if (hasChart && data.data && data.data.length > 0) {
        setTimeout(() => renderMsgChart(chartId, data), 100);
    }
}

// ============================================================
// Append Error Message
// ============================================================
function appendErrorMessage(msg) {
    const chatArea = document.getElementById('chatArea');
    const el = document.createElement('div');
    el.className = 'msg-bot fade-in';
    el.innerHTML = `
        <div style="display:flex;align-items:flex-start;gap:10px;padding:4px 0;">
            <div class="bot-avatar" style="background:linear-gradient(135deg,#ef4444,#dc2626);">
                <i class="fas fa-exclamation-triangle" style="font-size:13px;"></i>
            </div>
            <div style="background:#fef2f2;border:1px solid #fecaca;padding:12px 16px;border-radius:12px;flex:1;">
                <p style="color:#dc2626;font-size:13px;font-weight:500;margin-bottom:2px;">오류가 발생했습니다</p>
                <p style="color:#991b1b;font-size:12px;">${esc(msg)}</p>
            </div>
        </div>`;
    chatArea.appendChild(el);
    scrollToBottom();
}

// ============================================================
// Render Chart in Message
// ============================================================
function renderMsgChart(canvasId, data) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');

    const rows = data.data || [];
    if (rows.length === 0) return;

    const chartType = data.chartType || 'bar';
    if (chartType === 'table') return;

    const config = data.chartConfig || {};
    const columns = Object.keys(rows[0]);
    const labelCol = config.labelColumn || columns[0];
    let dataCols = config.dataColumns || columns.filter(c => c !== labelCol);
    dataCols = dataCols.filter(c => {
        const v = rows[0][c];
        return typeof v === 'number' || (typeof v === 'string' && !isNaN(Number(v)));
    });
    if (dataCols.length === 0) dataCols = columns.filter(c => c !== labelCol && typeof rows[0][c] === 'number');
    if (dataCols.length === 0) return;

    const labels = rows.map(r => r[labelCol] != null ? String(r[labelCol]) : '');
    const colors = [
        'rgba(79,70,229,0.75)','rgba(16,185,129,0.75)','rgba(245,158,11,0.75)',
        'rgba(239,68,68,0.75)','rgba(139,92,246,0.75)','rgba(236,72,153,0.75)',
        'rgba(20,184,166,0.75)','rgba(249,115,22,0.75)','rgba(99,102,241,0.75)',
        'rgba(34,197,94,0.75)','rgba(168,85,247,0.75)','rgba(244,63,94,0.75)',
    ];
    const borders = colors.map(c => c.replace('0.75','1'));

    let datasets;
    if (chartType === 'pie' || chartType === 'doughnut') {
        datasets = [{
            data: rows.map(r => Number(r[dataCols[0]]) || 0),
            backgroundColor: colors.slice(0, rows.length),
            borderWidth: 2, borderColor: '#fff',
        }];
    } else {
        datasets = dataCols.map((c, i) => ({
            label: c,
            data: rows.map(r => Number(r[c]) || 0),
            backgroundColor: colors[i % colors.length],
            borderColor: borders[i % borders.length],
            borderWidth: chartType === 'line' ? 2.5 : 1,
            tension: 0.35, fill: false,
            borderRadius: chartType === 'bar' ? 4 : 0,
        }));
    }

    const chart = new Chart(ctx, {
        type: chartType,
        data: { labels, datasets },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: {
                title: {
                    display: !!config.title, text: config.title || '',
                    font: { size: 14, family: 'Noto Sans KR', weight: '600' },
                    color: '#1e293b', padding: { bottom: 12 },
                },
                legend: {
                    display: chartType === 'pie' || chartType === 'doughnut' || dataCols.length > 1,
                    labels: { font: { size: 11, family: 'Noto Sans KR' }, usePointStyle: true, padding: 12 },
                },
                tooltip: {
                    backgroundColor: 'rgba(15,23,42,0.9)',
                    titleFont: { family: 'Noto Sans KR', size: 12 },
                    bodyFont: { family: 'Noto Sans KR', size: 11 },
                    padding: 10, cornerRadius: 8,
                    callbacks: {
                        label: ctx => {
                            let v = ctx.parsed.y ?? ctx.parsed;
                            return (ctx.dataset.label||'') + ': ' + (typeof v==='number'?v.toLocaleString('ko-KR'):v);
                        }
                    }
                }
            },
            scales: (chartType === 'pie' || chartType === 'doughnut') ? {} : {
                x: { ticks: { font: { size: 10, family: 'Noto Sans KR' }, maxRotation: 45, color: '#64748b' }, grid: { display: false } },
                y: { ticks: { font: { size: 10 }, callback: v => Number(v).toLocaleString('ko-KR'), color: '#64748b' }, grid: { color: 'rgba(0,0,0,0.04)' } },
            },
        },
    });
    charts[canvasId] = chart;
}

// ============================================================
// Tab switch inside message
// ============================================================
function switchTab(btn, msgId) {
    const panelId = btn.dataset.panel;
    // Deactivate all tabs in this message
    btn.parentElement.querySelectorAll('.res-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    // Hide all panels in this message card
    const card = btn.closest('.msg-bot-inner');
    card.querySelectorAll('.res-panel').forEach(p => { p.classList.remove('active'); p.style.display = 'none'; });
    const target = document.getElementById(panelId);
    if (target) { target.classList.add('active'); target.style.display = 'block'; }
}

// ============================================================
// Utils
// ============================================================
function scrollToBottom() {
    const ca = document.getElementById('chatArea');
    setTimeout(() => { ca.scrollTop = ca.scrollHeight; }, 50);
}
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
